<!doctype html>

<html class="light" lang="en">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>Login | ORBS Enterprise</title>
    <!-- Google Fonts: Manrope for headlines, Inter for body/labels -->
    <link
      href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&amp;family=Inter:wght@400;500;600&amp;display=swap"
      rel="stylesheet"
    />
    <!-- Material Symbols Outlined -->
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <link
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap"
      rel="stylesheet"
    />
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary-fixed": "#dbe1ff",
              "on-surface": "#191c1e",
              "on-error-container": "#93000a",
              "on-tertiary-container": "#87c0e8",
              "tertiary-fixed": "#c8e6ff",
              "error-container": "#ffdad6",
              surface: "#f7f9fb",
              primary: "#002b80",
              "surface-container-high": "#e6e8ea",
              "surface-container-low": "#f2f4f6",
              "on-tertiary-fixed-variant": "#004c6d",
              "secondary-fixed-dim": "#b8c5f7",
              "surface-dim": "#d8dadc",
              "on-surface-variant": "#434653",
              "surface-tint": "#2a56c7",
              "tertiary-fixed-dim": "#94cdf6",
              "surface-container-lowest": "#ffffff",
              "on-error": "#ffffff",
              "on-primary-fixed": "#00174c",
              tertiary: "#003751",
              secondary: "#505d89",
              "on-tertiary": "#ffffff",
              "on-secondary-fixed": "#091941",
              "inverse-primary": "#b5c4ff",
              "on-tertiary-fixed": "#001e2e",
              outline: "#747685",
              "surface-container": "#eceef0",
              "secondary-fixed": "#dbe1ff",
              "on-secondary-fixed-variant": "#38456f",
              "on-secondary-container": "#495682",
              "on-primary": "#ffffff",
              "on-background": "#191c1e",
              "inverse-on-surface": "#eff1f3",
              "surface-variant": "#e0e3e5",
              "primary-fixed-dim": "#b5c4ff",
              "on-primary-fixed-variant": "#003dab",
              "on-primary-container": "#a1b6ff",
              "primary-container": "#003fb1",
              "inverse-surface": "#2d3133",
              background: "#f7f9fb",
              "secondary-container": "#c0cdff",
              "outline-variant": "#c4c6d6",
              "surface-bright": "#f7f9fb",
              "on-secondary": "#ffffff",
              error: "#ba1a1a",
              "surface-container-highest": "#e0e3e5",
              "tertiary-container": "#004f72",
            },
            fontFamily: {
              headline: ["Manrope"],
              body: ["Inter"],
              label: ["Inter"],
            },
            borderRadius: {
              DEFAULT: "0.25rem",
              lg: "1rem",
              xl: "1.25rem",
              full: "9999px",
            },
          },
        },
      };
    </script>
    <style>
      .material-symbols-outlined {
        font-variation-settings:
          "FILL" 0,
          "wght" 400,
          "GRAD" 0,
          "opsz" 24;
      }
      .bg-login-gradient {
        background: radial-gradient(
          circle at top right,
          #e6e8ea 0%,
          #f7f9fb 100%
        );
      }
    </style>
  </head>
  <body
    class="bg-surface font-body text-on-surface min-h-screen flex flex-col items-center justify-center p-6 bg-login-gradient"
  >
    <!-- Main Content Canvas -->
    <main class="w-full max-w-md flex flex-col items-center">
      <!-- Header / Logo Area -->
      <div class="mb-10 text-center">
        <div class="flex items-center justify-center gap-3 mb-2">
          <div
            class="w-10 h-10 bg-primary rounded-lg flex items-center justify-center text-on-primary"
          >
            <span class="material-symbols-outlined" data-icon="widgets"
              >widgets</span
            >
          </div>
          <h1
            class="font-headline font-extrabold text-3xl tracking-tight text-primary"
          >
            ORBS
          </h1>
        </div>
        <p class="font-label text-on-surface-variant text-sm tracking-wide">
          Organization Resource Booking System
        </p>
      </div>
      <!-- Login Card -->
      <div
        class="w-full bg-surface-container-lowest rounded-lg p-8 md:p-10 shadow-[0_12px_40px_rgba(0,43,128,0.06)] border border-outline-variant/10"
      >
        <div class="mb-8">
          <h2 class="font-headline font-bold text-2xl text-on-surface mb-2">
            Welcome Back
          </h2>
          <p class="text-on-surface-variant text-sm">
            Please enter your credentials to access the platform.
          </p>
        </div>
        <form action="dashboard.html" class="space-y-6">
          <!-- Username Field -->
          <div class="space-y-2">
            <label
              class="font-label text-sm font-semibold text-on-surface-variant block ml-1"
              for="username"
              >Username</label
            >
            <div class="relative">
              <span
                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]"
                data-icon="person"
                >person</span
              >
              <input
                class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline/60 outline-none"
                id="username"
                name="username"
                placeholder="Enter your username"
                type="text"
              />
            </div>
          </div>
          <!-- Password Field -->
          <div class="space-y-2">
            <div class="flex justify-between items-center">
              <label
                class="font-label text-sm font-semibold text-on-surface-variant block ml-1"
                for="password"
                >Password</label
              >
              <a
                class="text-xs font-semibold text-primary hover:underline transition-all"
                href="#"
                >Forgot Password?</a
              >
            </div>
            <div class="relative">
              <span
                class="absolute left-4 top-1/2 -translate-y-1/2 material-symbols-outlined text-outline text-[20px]"
                data-icon="lock"
                >lock</span
              >
              <input
                class="w-full pl-12 pr-4 py-3.5 bg-surface-container-low border-none rounded-lg focus:ring-2 focus:ring-primary/20 focus:bg-surface-container-lowest transition-all text-on-surface placeholder:text-outline/60 outline-none"
                id="password"
                name="password"
                placeholder="••••••••"
                type="password"
              />
            </div>
          </div>
          <!-- Remember Me -->
          <div class="flex items-center gap-2 px-1">
            <input
              class="w-4 h-4 rounded border-outline-variant text-primary focus:ring-primary"
              id="remember"
              type="checkbox"
            />
            <label
              class="text-xs text-on-surface-variant font-medium"
              for="remember"
              >Keep me signed in for 30 days</label
            >
          </div>
          <!-- Submit Button -->
          <button
            class="w-full py-4 px-6 bg-gradient-to-br from-primary to-primary-container text-on-primary font-headline font-bold rounded-lg shadow-lg shadow-primary/10 hover:shadow-xl hover:shadow-primary/20 active:scale-[0.98] transition-all flex items-center justify-center gap-2"
            type="submit"
          >
            Login to ORBS
            <span
              class="material-symbols-outlined text-[20px]"
              data-icon="arrow_forward"
              >arrow_forward</span
            >
          </button>
        </form>
        <!-- Social/SSO Divider -->
        <div class="mt-8 flex items-center gap-4">
          <div class="h-[1px] flex-1 bg-outline-variant/30"></div>

          <div class="h-[1px] flex-1 bg-outline-variant/30"></div>
        </div>
      </div>
      <!-- Help Section -->
      <p class="mt-8 text-on-surface-variant text-sm font-medium">
        More about ORBS ?
        <a
          class="text-primary font-bold hover:underline"
          href="orbs_roadmap.html"
          >CLICK HERE</a
        >
      </p>
    </main>
    <!-- Footer Credit Line -->
    <footer class="w-full mt-16">
      <div class="w-full text-center">
        <p class="text-xs text-on-surface-variant">
          Developed by Kitsanarat Ongsatta <br />
          IT Support |
          <span class="font-bold text-primary">Maryanne Co., Ltd.</span>
        </p>
      </div>
    </footer>
    <!-- Decorative Elements (Architectural Curator) -->
    <div
      class="fixed top-0 left-0 w-full h-full pointer-events-none -z-10 overflow-hidden"
    >
      <div
        class="absolute -top-[10%] -left-[5%] w-[40%] h-[40%] bg-primary/5 rounded-full blur-[120px]"
      ></div>
      <div
        class="absolute -bottom-[10%] -right-[5%] w-[40%] h-[40%] bg-tertiary-container/10 rounded-full blur-[120px]"
      ></div>
    </div>
  </body>
</html>
